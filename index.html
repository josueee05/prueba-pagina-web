<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mi primera web</title>
  <style>
    body {
      font-family: Arial;
      background-color: #0f172a;
      color: white;
      text-align: center;
      margin-top: 100px;
    }

    h1 {
      color: #38bdf8;
    }

    button {
      padding: 10px 20px;
      border: none;
      background-color: #22c55e;
      color: white;
      cursor: pointer;
      border-radius: 8px;
    }

    button:hover {
      background-color: #16a34a;
    }
  </style>
</head>
<body>
  <h1>Hola Josue 🚀</h1>
  <p>Estoy aprendiendo Git y GitHub</p>

  <button onclick="saludar()">Haz click</button>
  <h2>Esta es una nueva funcionalidad 🚀</h2>

  <script>
    function saludar() {
      alert("¡Bienvenido a mi página!");
    }
  </script>
</body>
</html>
